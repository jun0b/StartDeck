<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StartDeck</title>
    <link rel="icon" href="icons/icon16.png" sizes="16x16" type="image/png" />
    <link rel="icon" href="icons/icon48.png" sizes="48x48" type="image/png" />
    <link
      rel="icon"
      href="icons/icon128.png"
      sizes="128x128"
      type="image/png"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Background -->
      <div class="app-background"></div>

      <div class="app-content">
        <!-- Header -->
        <header class="app-header">
          <div class="app-header__left">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="color: var(--accent-primary)"
            >
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span class="app-header__title">StartDeck</span>
          </div>
          <div class="app-header__right">
            <button class="header-btn" id="settings-toggle">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3"></circle>
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
                ></path>
              </svg>
            </button>
          </div>
        </header>

        <!-- Search Bar -->
        <div class="search-container" id="search-container"></div>

        <!-- Dashboard -->
        <div class="dashboard" id="dashboard">
          <!-- Background Attribution -->
          <div class="app-bg-attribution" id="bg-attribution"></div>
        </div>
      </div>

      <!-- Idle Overlay -->
      <div class="idle-overlay" id="idle-overlay">
        <div class="idle-clock" id="idle-clock">00:00</div>
        <div class="idle-date" id="idle-date"></div>
      </div>

      <!-- Link Preview Modal -->
      <div class="preview-overlay" id="link-preview-overlay">
        <div class="preview-window">
          <div class="preview-header">
            <div class="preview-header__left">
              <img id="preview-favicon" src="" alt="" style="width:16px;height:16px;margin-right:8px;display:none">
              <span class="preview-title" id="preview-url-text">Loading...</span>
            </div>
            <div class="preview-header__right">
              <button class="preview-header__btn" id="preview-toggle-reader" title="リーダーモード">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5z"/><path d="M8 7h8"/><path d="M8 11h8"/><path d="M8 15h5"/></svg>
              </button>
              <button class="preview-header__btn" id="preview-open-external" title="新しいタブで開く">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              </button>
              <button class="preview-header__btn" id="preview-close-btn" title="閉じる">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              </button>
            </div>
          </div>
          <div class="preview-body">
            <div class="preview-loading"></div>
            <iframe id="preview-frame" src="about:blank"></iframe>
            <div id="preview-reader-view" class="preview-reader-view hidden">
              <div class="reader-container">
                <h1 id="reader-title"></h1>
                <div id="reader-meta"></div>
                <div id="reader-body"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings Panel -->
    <aside class="settings-panel" id="settings-panel">
      <div class="settings-panel__header">
        <span class="settings-panel__title">設定</span>
        <button class="header-btn" id="settings-close">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="settings-section">
        <div class="settings-section__title">外観</div>
        <div class="form-group">
          <label class="form-label">テーマ</label>
          <select class="form-select" id="setting-theme">
            <option value="dark">ダーク</option>
            <option value="light">ライト</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">カラム数</label>
          <select class="form-select" id="setting-columns">
            <option value="1">1カラム</option>
            <option value="2">2カラム</option>
            <option value="3" selected>3カラム</option>
            <option value="4">4カラム</option>
          </select>
        </div>
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <label class="form-label" style="margin-bottom: 0;">ウィジェットの透明度</label>
            <span id="val-widget-opacity" style="font-size: 0.72rem; color: var(--text-tertiary); font-family: var(--font-mono, monospace);">72%</span>
          </div>
          <input type="range" id="setting-widget-opacity" min="0" max="100" step="1" value="72" style="width: 100%; cursor: pointer;">
        </div>
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <label class="form-label" style="margin-bottom: 0;">ブラーの強さ</label>
            <span id="val-widget-blur" style="font-size: 0.72rem; color: var(--text-tertiary); font-family: var(--font-mono, monospace);">20px</span>
          </div>
          <input type="range" id="setting-widget-blur" min="0" max="40" step="1" value="20" style="width: 100%; cursor: pointer;">
        </div>
        <div class="form-group">
          <label class="form-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="setting-idle-enabled" style="width: auto; cursor: pointer;">
            離席時スクリーンセーバーを表示
          </label>
        </div>
        <div class="form-group" id="idle-time-group" style="display: none; margin-left: 26px;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <input class="form-input" id="setting-idle-time" type="number" min="1" max="1440" value="5" style="width: 80px; text-align: center;">
            <span class="form-label" style="margin-bottom: 0;">分後に表示</span>
          </div>
          <button class="btn btn--ghost" id="setting-idle-test" style="width: 100%; margin-top: 8px; font-size: 0.72rem; padding: 4px;">今すぐテスト表示する</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section__title">背景</div>
        <div class="form-group">
          <label class="form-label">背景タイプ</label>
          <select class="form-select" id="setting-bg-type">
            <option value="auto">自動取得（ランダム画像）</option>
            <option value="custom">カスタムURL</option>
            <option value="solid">単色</option>
          </select>
        </div>
        <div class="form-group" id="bg-interval-group">
          <label class="form-label">更新間隔（分）</label>
          <div style="display: flex; align-items: center; gap: 8px;">
            <input class="form-input" id="setting-bg-interval" type="number" min="1" max="1440" value="60" style="width: 80px; text-align: center;">
            <span class="form-label" style="margin-bottom: 0;">分ごとに更新</span>
            <span id="bg-update-timer" style="font-size: 0.72rem; color: var(--accent-primary); margin-left: 12px; font-weight: 500; font-variant-numeric: tabular-nums;"></span>
          </div>
        </div>
        <div class="form-group" id="bg-url-group">
          <label class="form-label">画像URL（カスタム時）</label>
          <input
            class="form-input"
            id="setting-bg-url"
            type="text"
            placeholder="https://..."
          />
        </div>
        <div class="form-group" id="bg-file-group">
          <label class="form-label">ローカルファイルから選択</label>
          <input
            type="file"
            id="setting-bg-file"
            accept="image/*"
            style="font-size: 0.78rem; color: var(--text-secondary)"
          />
        </div>
        <div class="form-group" id="bg-color-group" style="display: none">
          <label class="form-label">背景色</label>
          <div style="display: flex; gap: 8px; align-items: center">
            <input
              type="color"
              id="setting-bg-color"
              value="#111114"
              style="
                width: 48px;
                height: 32px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                background: var(--bg-input);
              "
            />
            <input
              class="form-input"
              id="setting-bg-color-hex"
              type="text"
              value="#111114"
              placeholder="#111114"
              style="flex: 1"
            />
          </div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section__title">データ</div>
        <div style="display: flex; gap: 8px">
          <button class="btn btn--ghost" id="setting-export" style="flex: 1">
            エクスポート
          </button>
          <button class="btn btn--ghost" id="setting-import" style="flex: 1">
            インポート
          </button>
          <input
            type="file"
            id="setting-import-file"
            accept=".json"
            style="display: none"
          />
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section__title">ショートカット</div>
        <div
          style="
            font-size: 0.78rem;
            color: var(--text-secondary);
            line-height: 1.8;
          "
        >
          <div>
            <kbd
              style="
                background: var(--bg-input);
                padding: 2px 6px;
                border-radius: 4px;
                font-size: 0.72rem;
              "
              >/</kbd
            >
            検索バーにフォーカス
          </div>
          <div>
            <kbd
              style="
                background: var(--bg-input);
                padding: 2px 6px;
                border-radius: 4px;
                font-size: 0.72rem;
              "
              >Esc</kbd
            >
            ダイアログを閉じる
          </div>
        </div>
      </div>


    </aside>

    <!-- Scripts (順序重要) -->
    <script src="js/storage.js"></script>
    <script src="js/preview-manager.js"></script>
    <script src="js/widget-manager.js"></script>
    <script src="js/widgets/search.js"></script>
    <script src="js/widgets/clock.js"></script>
    <script src="js/widgets/bookmark.js"></script>
    <script src="js/widgets/memo.js"></script>
    <script src="js/widgets/task.js"></script>
    <script src="js/widgets/weather.js"></script>
    <script src="js/widgets/rss.js"></script>
    <script src="js/widgets/stock.js"></script>
    <script src="js/widgets/embed.js"></script>
    <script src="js/widgets/calendar.js"></script>
    <script src="js/widgets/minicalendar.js"></script>
    <script src="js/widgets/media.js"></script>
    <script src="js/widgets/password.js"></script>
    <script src="js/widgets/network.js"></script>
    <script src="js/widgets/top-sites.js"></script>
    <script src="js/widgets/system.js"></script>
    <script src="js/widgets/ip.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
