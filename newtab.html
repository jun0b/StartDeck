<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StartDeck</title>
    <link rel="icon" href="icons/icon16.png" sizes="16x16" type="image/png" />
    <link rel="icon" href="icons/icon48.png" sizes="48x48" type="image/png" />
    <link
      rel="icon"
      href="icons/icon128.png"
      sizes="128x128"
      type="image/png"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Background -->
      <div class="app-background"></div>

      <!-- Header -->
      <header class="app-header">
        <div class="app-header__left">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="color: var(--accent-primary)"
          >
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          <span class="app-header__title">StartDeck</span>
        </div>
        <div class="app-header__right">
          <button class="header-btn" id="settings-toggle" data-tooltip="設定">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Search Bar -->
      <div class="search-container" id="search-container"></div>

      <!-- Dashboard -->
      <div class="dashboard" id="dashboard">
        <!-- Background Attribution -->
        <div class="app-bg-attribution" id="bg-attribution"></div>
      </div>
    </div>

    <!-- Settings Panel -->
    <aside class="settings-panel" id="settings-panel">
      <div class="settings-panel__header">
        <span class="settings-panel__title">設定</span>
        <button class="header-btn" id="settings-close">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="settings-section">
        <div class="settings-section__title">外観</div>
        <div class="form-group">
          <label class="form-label">テーマ</label>
          <select class="form-select" id="setting-theme">
            <option value="dark">ダーク</option>
            <option value="light">ライト</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">カラム数</label>
          <select class="form-select" id="setting-columns">
            <option value="1">1カラム</option>
            <option value="2">2カラム</option>
            <option value="3" selected>3カラム</option>
            <option value="4">4カラム</option>
          </select>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section__title">背景</div>
        <div class="form-group">
          <label class="form-label">背景タイプ</label>
          <select class="form-select" id="setting-bg-type">
            <option value="auto">自動取得（ランダム画像）</option>
            <option value="nasa">NASA 今日の1枚</option>
            <option value="custom">カスタムURL</option>
            <option value="solid">単色</option>
          </select>
        </div>
        <div class="form-group" id="bg-url-group">
          <label class="form-label">画像URL（カスタム時）</label>
          <input
            class="form-input"
            id="setting-bg-url"
            type="text"
            placeholder="https://..."
          />
        </div>
        <div class="form-group" id="bg-file-group">
          <label class="form-label">ローカルファイルから選択</label>
          <input
            type="file"
            id="setting-bg-file"
            accept="image/*"
            style="font-size: 0.78rem; color: var(--text-secondary)"
          />
        </div>
        <div class="form-group" id="bg-color-group" style="display: none">
          <label class="form-label">背景色</label>
          <div style="display: flex; gap: 8px; align-items: center">
            <input
              type="color"
              id="setting-bg-color"
              value="#111114"
              style="
                width: 48px;
                height: 32px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                background: var(--bg-input);
              "
            />
            <input
              class="form-input"
              id="setting-bg-color-hex"
              type="text"
              value="#111114"
              placeholder="#111114"
              style="flex: 1"
            />
          </div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section__title">データ</div>
        <div style="display: flex; gap: 8px">
          <button class="btn btn--ghost" id="setting-export" style="flex: 1">
            エクスポート
          </button>
          <button class="btn btn--ghost" id="setting-import" style="flex: 1">
            インポート
          </button>
          <input
            type="file"
            id="setting-import-file"
            accept=".json"
            style="display: none"
          />
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section__title">ショートカット</div>
        <div
          style="
            font-size: 0.78rem;
            color: var(--text-secondary);
            line-height: 1.8;
          "
        >
          <div>
            <kbd
              style="
                background: var(--bg-input);
                padding: 2px 6px;
                border-radius: 4px;
                font-size: 0.72rem;
              "
              >/</kbd
            >
            検索バーにフォーカス
          </div>
          <div>
            <kbd
              style="
                background: var(--bg-input);
                padding: 2px 6px;
                border-radius: 4px;
                font-size: 0.72rem;
              "
              >Esc</kbd
            >
            ダイアログを閉じる
          </div>
        </div>
      </div>


    </aside>

    <!-- Scripts (順序重要) -->
    <script src="js/storage.js"></script>
    <script src="js/widget-manager.js"></script>
    <script src="js/widgets/search.js"></script>
    <script src="js/widgets/clock.js"></script>
    <script src="js/widgets/bookmark.js"></script>
    <script src="js/widgets/memo.js"></script>
    <script src="js/widgets/task.js"></script>
    <script src="js/widgets/weather.js"></script>
    <script src="js/widgets/rss.js"></script>
    <script src="js/widgets/stock.js"></script>
    <script src="js/widgets/embed.js"></script>
    <script src="js/widgets/calendar.js"></script>
    <script src="js/widgets/minicalendar.js"></script>
    <script src="js/widgets/media.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
